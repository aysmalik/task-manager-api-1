name: CI Pipeline

on:
  push:
    branches: ["main", "feature/*"]
  pull_request:
    branches: ["main"]

jobs:
  # ----------------------------------------------------------------------
  # Stage 1: Build & Verify
  # ----------------------------------------------------------------------
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip' # Speeds up subsequent runs by caching dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify application imports
        run: |
          python -c "from app import create_app; print('Import Verification: OK')"

  # ----------------------------------------------------------------------
  # Stage 2: Run Unit Tests
  # ----------------------------------------------------------------------
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute pytest
        run: |
          # Running via 'python -m' ensures 'app' is added to PYTHONPATH correctly
          python -m pytest tests/ -v --tb=short

  # ----------------------------------------------------------------------
  # Stage 3: Code Quality Check
  # ----------------------------------------------------------------------
  quality:
    name: Lint Check (flake8)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8 linter
        run: |
          # Linting based on your local .flake8 configuration file
          flake8 app/ run.py

  # ----------------------------------------------------------------------
  # Stage 4: Package & Containerize
  # ----------------------------------------------------------------------
  package:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false # Keeps push disabled until repository secrets are configured
          tags: task-manager-api:1.0.0, task-manager-api:latest
          cache-from: type=gha # Enables fast GitHub Actions native caching for layers
          cache-to: type=gha,mode=max
